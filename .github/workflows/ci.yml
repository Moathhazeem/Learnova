name: CI Pipeline
on:
    push:
        branches: [ "main" ]
    jobs:
        build:
            runs-on: ubuntu-latest
            steps:
            - names: Checkout code
              uses: actions/checkout@v4
            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
                cache: 'npm'
            - run: npm ci
            - run: npm run build
            - run: npm test